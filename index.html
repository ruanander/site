<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruan - Links</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .profile img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #00ffcc;
            margin-bottom: 10px;
        }

        .profile h1 {
            margin: 10px 0;
        }

        .link {
            display: block;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .link:hover {
            background: #00ccaa;
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="profile">
            <img src="IMG_20251214_161641014_HDR.jpg" alt="Foto de Ruan">
            <h1>Ruan</h1>
            <p>Meus links 👇</p>
        </div>

        <a class="link" href="#" target="_blank">🌐 Meu Site</a>
        <a class="link" href="#" target="_blank">📸 Instagram</a>
        <a class="link" href="#" target="_blank">🎥 YouTube</a>

        <!-- LINKEDIN FUNCIONANDO -->
        <a class="link" href="https://www.linkedin.com/in/ruan-ander-727053382/" target="_blank">
            💼 Meu LinkedIn
        </a>

        <footer>
            © 2026 - Ruan
        </footer>

    </div>
</body>
</html>
