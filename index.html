<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Linktree</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111, #222);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .profile img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .profile h1 {
            margin: 10px 0;
        }

        .link {
            display: block;
            background: #ffcc00;
            color: black;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .link:hover {
            background: #ffaa00;
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="profile">
            <img src="https://via.placeholder.com/120" alt="Foto de perfil">
            <h1>Ruan</h1>
            <p>Meus links 👇</p>
        </div>

        <a class="link" href="#" target="_blank">🌐 Meu Site</a>
        <a class="link" href="#" target="_blank">📸 Instagram</a>
        <a class="link" href="#" target="_blank">🎥 YouTube</a>
        <a class="link" href="#" target="_blank">💼 LinkedIn</a>

        <footer>
            © 2026 - Meu Linktree
        </footer>

    </div>
</body>
</html>
