<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruan - Links</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #052e16, #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .profile img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #22c55e;
            margin-bottom: 10px;
        }

        .profile h1 {
            margin: 10px 0;
        }

        .link {
            display: block;
            background: #064e3b;
            color: #22c55e;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid #22c55e;
        }

        .link:hover {
            background: #22c55e;
            color: black;
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="profile">
            <img src="IMG_20251214_161641014_HDR.jpg" alt="Foto de Ruan">
            <h1>Ruan</h1>
            <p>Meus links 👇</p>
        </div>

        <a class="link" href="#" target="_blank">🌐 Meu Site</a>
        <a class="link" href="#" target="_blank">📸 Instagram</a>
        <a class="link" href="#" target="_blank">🎥 YouTube</a>

        <a class="link" href="https://www.linkedin.com/in/ruan-ander-727053382/" target="_blank">
            💼 Meu LinkedIn
        </a>

        <footer>
            © 2026 - Ruan
        </footer>

    </div>
</body>
</html>
